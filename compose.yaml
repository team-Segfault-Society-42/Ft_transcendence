# ── Docker Networks ──────────────────────────────────────────────────────────
networks:
  client-side:
    driver:
      bridge
  server-side:
    driver:
      bridge

services:
  # ── Frontend (React) ───────────────────────────────────────────────────────
  frontend:
    container_name: react
    image: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - client-side
# Uncomment to test frontend only (as a single service)
    # ports:
    #   - "5173:5173"
  
  # ── Backend (Nest.js) ──────────────────────────────────────────────────────
  backend:
    container_name: nestJS
    image: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - client-side
      - server-side
# Uncomment to test backend only (as a single service)
    # ports:
    #   - "3000:3000"
  
  # ── Reverse Proxy (Nginx) ──────────────────────────────────────────────────
  proxy:
    container_name: nginx
    image: proxy
    build:
      context: ./proxy
      dockerfile: Dockerfile
    networks:
      - client-side
    ports:
      - "1024:80"
    depends_on:
      - frontend
      - backend
  
  # ── Database (Postgres) ────────────────────────────────────────────────────
