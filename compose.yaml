# ── Docker Networks ──────────────────────────────────────────────────────────
networks:
  client-side:
    driver:
      bridge
  server-side:
    driver:
      bridge

# ── Docker Services ──────────────────────────────────────────────────────────
services:
  # ── Frontend (React) ─────────────────────────────────────────────
  frontend:
    container_name: react
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - client-side
# Uncomment to test frontend only (as a single service)
    # ports:
    #   - "5173:5173"

  # ── Backend (Nest.js) ────────────────────────────────────────────
  backend:
    container_name: nestJS
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - client-side
      - server-side
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend:/app                          # reflect host changes instantly
      - backend_node_modules:/app/node_modules  # prevent node_module overwrite in container
    secrets:
      - backend_pw
      - jwt_secret
    depends_on:
      db:
        condition: service_healthy
# Uncomment to test backend only (as a single service)
    # ports:
    #   - "3000:3000"

  # ── Reverse Proxy (Nginx) ────────────────────────────────────────
  proxy:
    container_name: nginx
    build:
      context: ./proxy
      dockerfile: Dockerfile
    networks:
      - client-side
    ports:
      - "1024:80"
    depends_on:
      - frontend
      - backend

  # ── Database (Postgres) ──────────────────────────────────────────
  db:
    container_name: postgres
    image: postgres:${POSTGRES_VERSION:-18-alpine} #fallback to 18-alpine if var not set
    networks:
      - server-side
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_root_pw
      - BACKEND_USER=${BACKEND_USER}
      - BACKEND_PW_FILE=/run/secrets/backend_pw
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/init.sh:/docker-entrypoint-initdb.d/init.sh
    secrets:
      - backend_pw
      - postgres_root_pw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

# ── Docker Volumes ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  backend_node_modules:

# ── Docker Secrets ──────────────────────────────────────────────────────────
secrets:
  backend_pw:
    file: ./secrets/backend_pw.txt
  postgres_root_pw:
    file: ./secrets/postgres_root_pw.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
