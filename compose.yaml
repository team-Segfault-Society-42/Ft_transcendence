# ── Docker Networks ──────────────────────────────────────────────────────────
networks:
  client-side:
    driver:
      bridge
  server-side:
    driver:
      bridge

services:
  # ── Frontend (React) ───────────────────────────────────────────────────────
  frontend:
    container_name: React
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    networks:
      - client-side
    ports:
      - "3000:3000"
  
  # ── Backend (Nest.js) ──────────────────────────────────────────────────────
  backend:
    container_name: Nest.js
    build:
      context: ./Backend
      dockerfile: Dockerfile
    networks:
      - client-side
      - server-side
    ports:
      - "5000:5000"
  
  # ── Reverse Proxy (Nginx) ──────────────────────────────────────────────────
  proxy:
    container_name: Nginx
    build:
      context: ./Proxy
      dockerfile: Dockerfile
    networks:
      - client-side
    ports:
      - "443:443"
    depends_on:
      - frontend
      - backend
  
