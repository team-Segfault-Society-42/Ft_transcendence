# ── Docker Services ──────────────────────────────────────────────────────────
services:
  # ── Frontend (React) ─────────────────────────────────────────────
  frontend:
    container_name: dev-frontend
    build:
      target: dev
    volumes:
      - ./frontend:/app                         # reflect host changes instantly
      - frontend_node_modules:/app/node_modules # prevent node_module overwrite in container

 
  # ── Backend (Nest.js) ────────────────────────────────────────────
  backend:
    container_name: dev-backend
    build:
      target: dev
    environment:
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend:/app                          # reflect host changes instantly
      - backend_node_modules:/app/node_modules  # prevent node_module overwrite in container

  # ── Reverse Proxy (Nginx) ────────────────────────────────────────
  proxy:
    container_name: dev-proxy
    build:
      target: dev
    ports:
      - "1024:80"

  # ── Database (Postgres) ──────────────────────────────────────────
  db:
    container_name: dev-db

# ── Docker Volumes ──────────────────────────────────────────────────────────
volumes:
  frontend_node_modules:
  backend_node_modules: