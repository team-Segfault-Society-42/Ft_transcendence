# ── Docker Services ──────────────────────────────────────────────────────────
services:
  # ── Frontend (React) ─────────────────────────────────────────────
  frontend:
    build:
      target: dev
    volumes:
      - ./frontend:/app                         # reflect host changes instantly
      - frontend_node_modules:/app/node_modules # prevent node_module overwrite in container

 
  # ── Backend (Nest.js) ────────────────────────────────────────────
  backend:
    build:
      target: dev
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend:/app                          # reflect host changes instantly
      - backend_node_modules:/app/node_modules  # prevent node_module overwrite in container

  # ── Reverse Proxy (Nginx) ────────────────────────────────────────
  proxy:
    build:
      target: dev

# ── Docker Volumes ──────────────────────────────────────────────────────────
volumes:
  frontend_node_modules:
  backend_node_modules: