# ── Docker Services ──────────────────────────────────────────────────────────
services:
  # ── Frontend (React) ─────────────────────────────────────────────
  frontend:
    volumes:
      - ./frontend:/app                         # reflect host changes instantly
      - frontend_node_modules:/app/node_modules # prevent node_module overwrite in container

 
  # ── Backend (Nest.js) ────────────────────────────────────────────
  backend:
    volumes:
      - ./backend:/app                          # reflect host changes instantly
      - backend_node_modules:/app/node_modules  # prevent node_module overwrite in container
 
# ── Docker Volumes ──────────────────────────────────────────────────────────
volumes:
  frontend_node_modules:
  backend_node_modules: