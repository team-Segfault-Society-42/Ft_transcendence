# ── Docker Services ──────────────────────────────────────────────────────────
services:
  # ── Frontend (React) ─────────────────────────────────────────────
  frontend:
    container_name: dev-frontend
    build:
      target: dev
    volumes:
      - ./frontend:/app                         # reflect host changes instantly
      - frontend_node_modules:/app/node_modules # prevent node_module overwrite in container
    environment:
      - VITE_OAUTH_42_START_URL=${VITE_OAUTH_42_START_URL}


  # ── Backend (Nest.js) ────────────────────────────────────────────
  backend:
    container_name: dev-backend
    build:
      target: dev
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=http://localhost:1024
      - FORTYTWO_CLIENT_ID=${FORTYTWO_CLIENT_ID}
      - FORTYTWO_CLIENT_SECRET=${FORTYTWO_CLIENT_SECRET}
      - FORTYTWO_REDIRECT_URI=${FORTYTWO_REDIRECT_URI}
      - FRONTEND_OAUTH_SUCCESS_URL=${FRONTEND_OAUTH_SUCCESS_URL}
      - DOMAIN=${DOMAIN}
      - TWO_FACTOR_URL=${TWO_FACTOR_URL}

    volumes:
      - ./backend:/app                          # reflect host changes instantly
      - backend_node_modules:/app/node_modules  # prevent node_module overwrite in container

  # ── Reverse Proxy (Nginx) ────────────────────────────────────────
  proxy:
    container_name: dev-proxy
    build:
      target: dev
    ports:
      - "1024:80"

  # ── Database (Postgres) ──────────────────────────────────────────
  db:
    container_name: dev-db

# ── Docker Volumes ──────────────────────────────────────────────────────────
volumes:
  frontend_node_modules:
  backend_node_modules:
